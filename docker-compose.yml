version: "3.8"

services:
  adobe2api:
    build: .
    container_name: adobe2api
    ports:
      - "6001:6001"
    environment:
      - TZ=Asia/Shanghai
      - PORT=6001
      - ADOBE_API_KEY=clio-playground-web
      - ADOBE2API_OPS_KEY=${ADOBE2API_OPS_KEY:-}
      - ADOBE2API_VERSION=0.2.0
      - ADOBE2API_BUILD_SHA=${ADOBE2API_BUILD_SHA:-}
    volumes:
      # 持久化生成数据
      - ./data:/app/data
      # 持久化配置数据
      - ./config:/app/config
    restart: unless-stopped
