name: adobe2api-video

services:
  adobe2api-video:
    build: .
    container_name: adobe2api-video
    ports:
      - "${VIDEO_PORT:-6002}:6001"
    environment:
      - TZ=Asia/Shanghai
      - PORT=6001
      - ADOBE_API_KEY=clio-playground-web
    volumes:
      # 持久化生成数据
      - ./video-data:/app/data
      # 持久化配置数据
      - ./video-config:/app/config
    restart: unless-stopped
